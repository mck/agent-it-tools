path = "development bitwise"
summary = "Bitwise operations (and, or, xor, not, shl, shr) on integers with 0x/0b/0o prefixes"
when_to_use = "Bit math for flags, masks and registers. Never compute bitwise operations mentally."
it_tools = ["binary-calculator"]

[output]
kind = "json"
description = "Result as {decimal, hex, binary, octal}"

[[examples]]
argv = ["development", "bitwise", "--op", "xor", "0xff", "0b1010"]
stdout = """
{
  "binary": "0b11110101",
  "decimal": 245,
  "hex": "0xf5",
  "octal": "0o365"
}"""
