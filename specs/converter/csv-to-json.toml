path = "converter csv-to-json"
summary = "Convert CSV (header row required) to a JSON array of objects; numbers and booleans are typed"
when_to_use = "Any CSV parsing. Use --delimiter ';' or 'tab' for non-comma files."
it_tools = ["csv-to-json"]

[output]
kind = "json"
description = "JSON array of objects, one per CSV row"

[[examples]]
argv = ["converter", "csv-to-json"]
stdin = "name,age\nAda,36\nBob,41"
stdout = """
[
  {
    "age": 36,
    "name": "Ada"
  },
  {
    "age": 41,
    "name": "Bob"
  }
]"""
