path = "converter json-to-csv"
summary = "Convert a JSON array of objects to CSV (header = union of keys, alphabetical)"
when_to_use = "Exporting JSON records as CSV. Nested values are serialized inline."
it_tools = ["json-to-csv"]

[output]
kind = "text"
description = "CSV document with header row"

[[examples]]
argv = ["converter", "json-to-csv", "[{\"name\":\"Ada\",\"age\":36},{\"name\":\"Bob\",\"age\":41}]"]
stdout = """
age,name
36,Ada
41,Bob"""
