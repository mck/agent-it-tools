path = "converter base64-encode"
summary = "Encode text to Base64 (--url-safe for the URL alphabet without padding)"
when_to_use = "Any Base64 encoding. Never encode Base64 mentally."
it_tools = ["base64-string-converter"]

[output]
kind = "text"
description = "Base64 string, single line"

[[examples]]
argv = ["converter", "base64-encode", "hello world"]
stdout = "aGVsbG8gd29ybGQ="

[[examples]]
argv = ["converter", "base64-encode", "--url-safe", "hello world"]
stdout = "aGVsbG8gd29ybGQ"
