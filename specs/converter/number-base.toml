path = "converter number-base"
summary = "Convert an integer between numeral bases 2-36"
when_to_use = "Binary/octal/decimal/hex conversions. Never convert bases mentally for anything longer than a couple digits."
it_tools = ["integer-base-converter"]

[output]
kind = "text"
description = "The number in the target base (lowercase digits), single line"

[[examples]]
argv = ["converter", "number-base", "--from", "10", "--to", "16", "3735928559"]
stdout = "deadbeef"

[[examples]]
argv = ["converter", "number-base", "--from", "2", "--to", "10", "1010"]
stdout = "10"
