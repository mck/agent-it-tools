path = "converter lint"
summary = "Validate JSON, YAML, TOML or XML syntax"
when_to_use = "Checking whether a document parses before using it. Invalid input returns the error contract with the parser message, so this doubles as a diagnostic."
it_tools = ["json-linter", "toml-linter", "xml-linter"]

[output]
kind = "json"
description = "{\"valid\": true, \"format\": ...} on success; parse error on stderr otherwise"

[[examples]]
argv = ["converter", "lint", "--format", "toml", "a = 1"]
stdout = """
{
  "format": "toml",
  "valid": true
}"""
