path = "converter data"
summary = "Convert structured data between JSON, YAML, TOML and XML"
when_to_use = "Any JSON<->YAML<->TOML<->XML translation. TOML cannot represent null values or non-table roots - that returns an error. XML maps attributes to '@name' keys and text to '#text'."
it_tools = ["json-to-yaml-converter", "json-to-toml", "yaml-to-json-converter", "yaml-to-toml", "toml-to-json", "toml-to-yaml", "xml-to-json", "json-to-xml"]

[output]
kind = "text"
description = "The converted document in the target format"

[[examples]]
argv = ["converter", "data", "--from", "json", "--to", "yaml"]
stdin = '{"a":1,"b":{"c":[1,2,3]}}'
stdout = """
a: 1
b:
  c:
  - 1
  - 2
  - 3"""

[[examples]]
argv = ["converter", "data", "--from", "yaml", "--to", "toml", "name: test\nnums: [1, 2]"]
stdout = """
name = "test"
nums = [
    1,
    2,
]"""

[[examples]]
argv = ["converter", "data", "--from", "xml", "--to", "json", "<user id=\"7\"><name>Ada</name></user>"]
stdout = """
{
  "user": {
    "@id": "7",
    "name": "Ada"
  }
}"""
