path = "converter datetime"
summary = "Convert a date-time (now, unix s/ms, RFC 3339, RFC 2822) into all common formats"
when_to_use = "Timestamp conversion in either direction; omit the input for the current time. Never convert unix timestamps mentally."
it_tools = ["date-time-converter"]

[output]
kind = "json"
description = "Object with unix, unix_ms, iso8601 (UTC), rfc2822 and local fields"

[[examples]]
argv = ["converter", "datetime", "1751700000"]
stdout_regex = "\"iso8601\": \"2025-07-05T07:20:00Z\""
note = "The 'local' field depends on the machine timezone, so only the UTC field is asserted"
