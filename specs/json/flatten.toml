path = "json flatten"
summary = "Flatten nested JSON to dot-notation keys, or rebuild nesting with --nestify"
when_to_use = "Comparing deeply nested configs, generating env-style keys, or reversing a flattened structure. Consecutive integer keys fold back into arrays on --nestify."
it_tools = ["json-flatten-nestify", "yaml-flatten-nestify"]

[output]
kind = "json"
description = "Flat object with dot-notation keys (or nested JSON with --nestify)"

[[examples]]
argv = ["json", "flatten", "{\"a\":{\"b\":[1,2]},\"c\":true}"]
stdout = """
{
  "a.b.0": 1,
  "a.b.1": 2,
  "c": true
}"""

[[examples]]
argv = ["json", "flatten", "--nestify", "{\"a.b.0\":1,\"a.b.1\":2,\"c\":true}"]
stdout = """
{
  "a": {
    "b": [
      1,
      2
    ]
  },
  "c": true
}"""
