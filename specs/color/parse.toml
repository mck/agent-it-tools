path = "color parse"
summary = "Parse any CSS color (hex, rgb(), hsl(), named) and show hex, rgb, hsl and WCAG luminance"
when_to_use = "Color format conversion and luminance checks; never convert color spaces mentally."
it_tools = ["color-converter"]

[output]
kind = "json"
description = "{hex, rgb, hsl, luminance (WCAG relative luminance 0-1)}"

[[examples]]
argv = ["color", "parse", "#336699"]
stdout = """
{
  "hex": "#336699",
  "hsl": "hsl(210 50% 40%)",
  "luminance": 0.1251,
  "rgb": "rgb(51 102 153)"
}"""

[[examples]]
argv = ["color", "parse", "rebeccapurple"]
stdout = """
{
  "hex": "#663399",
  "hsl": "hsl(270 50% 40%)",
  "luminance": 0.0749,
  "rgb": "rgb(102 51 153)"
}"""
