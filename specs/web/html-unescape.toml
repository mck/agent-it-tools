path = "web html-unescape"
summary = "Decode HTML entities back to plain text"
when_to_use = "Reading text that contains &amp;, &lt;, &#39; and other HTML entities."
it_tools = ["html-entities"]

[output]
kind = "text"
description = "The decoded text"

[[examples]]
argv = ["web", "html-unescape", "&lt;b&gt;&amp;&quot;"]
stdout = "<b>&\""
