path = "web markdown-to-html"
summary = "Render Markdown (GitHub-flavored: tables, strikethrough, task lists, autolinks) to HTML"
when_to_use = "Any Markdown-to-HTML rendering; exact and spec-compliant instead of approximated."
it_tools = ["markdown-to-html"]

[output]
kind = "text"
description = "The rendered HTML fragment"

[[examples]]
argv = ["web", "markdown-to-html"]
stdin = "# Hi\n\n- a\n- b"
stdout = """
<h1>Hi</h1>
<ul>
<li>a</li>
<li>b</li>
</ul>"""
