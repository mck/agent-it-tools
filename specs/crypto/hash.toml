path = "crypto hash"
summary = "Hash text or a file (--file PATH) with md5, sha1, sha224, sha256, sha384 or sha512 (hex digest)"
when_to_use = "Checksums, content addressing, verifying downloads (--file hashes raw bytes). Never compute digests mentally. Not for passwords - use 'crypto bcrypt-hash'."
it_tools = ["hash-text", "file-hasher"]

[output]
kind = "text"
description = "Lowercase hex digest, single line"

[[examples]]
argv = ["crypto", "hash", "--algo", "sha256", "hello"]
stdout = "2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824"

[[examples]]
argv = ["crypto", "hash", "--algo", "md5"]
stdin = "hello"
stdout = "5d41402abc4b2a76b9719d911017c592"
note = "Input piped via stdin instead of an argument"
