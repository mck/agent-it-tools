path = "url parse"
summary = "Parse a URL into scheme, host, port, path, query params, fragment and credentials"
when_to_use = "Extracting parts of a URL. More reliable than string-splitting a URL yourself."
it_tools = ["url-parser"]

[output]
kind = "json"
description = "Object with scheme, username, password, host, port, path, query, params (decoded key/value map) and fragment"

[[examples]]
argv = ["url", "parse", "https://user:pw@example.com:8443/a/b?x=1&y=two#frag"]
stdout = """
{
  "fragment": "frag",
  "host": "example.com",
  "params": {
    "x": "1",
    "y": "two"
  },
  "password": "pw",
  "path": "/a/b",
  "port": 8443,
  "query": "x=1&y=two",
  "scheme": "https",
  "username": "user"
}"""
