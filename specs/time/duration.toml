path = "time duration"
summary = "Add or subtract a duration (e.g. '2h 30m', '1w 2d') from a timestamp"
when_to_use = "Date arithmetic. Never add durations to timestamps mentally."
it_tools = ["date-duration-calculator", "duration-calculator"]

[output]
kind = "json"
description = "{base, operation, duration_seconds, result: {unix, iso8601, ...}}"

[[examples]]
argv = ["time", "duration", "2h 30m", "--from", "1751700000"]
stdout_regex = "\"iso8601\": \"2025-07-05T09:50:00Z\""
note = "The result's 'local' field depends on the machine timezone, so only the UTC field is asserted"
