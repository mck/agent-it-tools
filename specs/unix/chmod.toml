path = "unix chmod"
summary = "Convert chmod permissions between octal (755, 4755) and symbolic (rwxr-xr-x) notation"
when_to_use = "Reading or constructing unix permissions, including setuid/setgid/sticky bits."
it_tools = ["chmod-calculator"]

[output]
kind = "json"
description = "{octal, symbolic, command}"

[[examples]]
argv = ["unix", "chmod", "4755"]
stdout = """
{
  "command": "chmod 4755 <file>",
  "octal": "4755",
  "symbolic": "rwsr-xr-x"
}"""

[[examples]]
argv = ["unix", "chmod", "rwxr-xr-x"]
stdout = """
{
  "command": "chmod 755 <file>",
  "octal": "755",
  "symbolic": "rwxr-xr-x"
}"""
